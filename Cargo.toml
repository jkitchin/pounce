[workspace]
resolver = "2"
members = [
    "crates/pounce-common",
    "crates/pounce-linalg",
    "crates/pounce-linsol",
    "crates/pounce-nlp",
    "crates/pounce-nl",
    "crates/pounce-hsl",
    "crates/pounce-feral",
    "crates/pounce-algorithm",
    "crates/pounce-restoration",
    "crates/pounce-presolve",
    "crates/pounce-l1penalty",
    "crates/pounce-qp",
    "crates/pounce-sensitivity",
    "crates/pounce-solve-report",
    "crates/pounce-observability",
    "crates/pounce-cinterface",
    "crates/pounce-py",
    "crates/pounce-cli",
    "crates/pounce-studio-core",
    "crates/pounce-studio-pyo3",
    "tools/iter-diff",
]
# Default `cargo build` / `cargo test` skip pounce-hsl so the pure-Rust
# build needs no Fortran/HSL toolchain. To build with the HSL MA57
# backend: `cargo build -p pounce-cli --features ma57`. The pounce-py
# crate is in members so plain `cargo check -p pounce-py` works for
# type-checking, but a wheel build still goes through `cd python &&
# maturin develop` (which enables the `extension-module` feature).
default-members = [
    "crates/pounce-common",
    "crates/pounce-linalg",
    "crates/pounce-linsol",
    "crates/pounce-nlp",
    "crates/pounce-nl",
    "crates/pounce-feral",
    "crates/pounce-algorithm",
    "crates/pounce-restoration",
    "crates/pounce-presolve",
    "crates/pounce-l1penalty",
    "crates/pounce-qp",
    "crates/pounce-sensitivity",
    "crates/pounce-solve-report",
    "crates/pounce-observability",
    "crates/pounce-cinterface",
    "crates/pounce-cli",
    "crates/pounce-studio-core",
    "tools/iter-diff",
]

[workspace.package]
version = "0.3.1-dev"
edition = "2021"
license = "EPL-2.0"
authors = ["John Kitchin <jkitchin@andrew.cmu.edu>"]
repository = "https://github.com/jkitchin/pounce"

# Internal + pinned external deps live here so `cargo publish` sees a
# `version =` on every path dep (cargo refuses to publish crates whose
# deps lack a registry version). Crates pick these up via
# `pounce-foo.workspace = true`.
[workspace.dependencies]
pounce-common = { path = "crates/pounce-common", version = "0.3.1-dev" }
pounce-linalg = { path = "crates/pounce-linalg", version = "0.3.1-dev" }
pounce-linsol = { path = "crates/pounce-linsol", version = "0.3.1-dev" }
pounce-nlp = { path = "crates/pounce-nlp", version = "0.3.1-dev" }
pounce-nl = { path = "crates/pounce-nl", version = "0.3.1-dev" }
pounce-hsl = { path = "crates/pounce-hsl", version = "0.3.1-dev" }
pounce-feral = { path = "crates/pounce-feral", version = "0.3.1-dev" }
pounce-algorithm = { path = "crates/pounce-algorithm", version = "0.3.1-dev" }
pounce-restoration = { path = "crates/pounce-restoration", version = "0.3.1-dev" }
pounce-presolve = { path = "crates/pounce-presolve", version = "0.3.1-dev" }
pounce-l1penalty = { path = "crates/pounce-l1penalty", version = "0.3.1-dev" }
pounce-qp = { path = "crates/pounce-qp", version = "0.3.1-dev" }
pounce-sensitivity = { path = "crates/pounce-sensitivity", version = "0.3.1-dev" }
pounce-solve-report = { path = "crates/pounce-solve-report", version = "0.3.1-dev" }
pounce-studio-core = { path = "crates/pounce-studio-core", version = "0.3.1-dev" }
pounce-observability = { path = "crates/pounce-observability", version = "0.3.1-dev" }
feral = "0.10.0"
# Dense linear algebra for the debugger's numerical rank diagnosis
# (SVD of the active-constraint Jacobian). Pure-Rust, MIT; we pull only
# the dense `std` core — no rayon/sparse/rand/npy.
faer = { version = "0.24.0", default-features = false, features = ["std"] }

# Observability / colored-output stack (pounce#71). `anstyle` is the
# style/color vocabulary, `anstyle-query` detects terminal capability
# (truecolor, NO_COLOR, …), `anstream` is the auto-stripping stdout
# wrapper. `tracing` + `tracing-subscriber` provide structured logging.
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "ansi", "json"] }
tracing-log = "0.2"
anstyle = "1"
anstyle-query = "1"
anstream = "0.6"

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"

[profile.release]
lto = "thin"
codegen-units = 1
debug = 1

