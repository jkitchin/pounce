# Build and publish `pyomo-pounce` to PyPI.
#
# Pure-Python wheel + sdist. The `pounce` executable lives in the
# `pounce-solver` dependency (its wheel ships the bundled CLI binary
# per platform), so pyomo-pounce itself contains no native code and
# needs no per-platform build.
#
# Triggers:
#   - push of a tag `pyomo-pounce-v*` -> build + publish to PyPI
#   - workflow_dispatch with target=testpypi -> dry-run publish
#   - workflow_dispatch with target=none -> just build artifacts
name: release-pyomo-pounce

on:
  push:
    tags: ["pyomo-pounce-v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to upload (pypi, testpypi, none)"
        required: true
        default: "none"
        type: choice
        options: [pypi, testpypi, none]

permissions:
  contents: read

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build
      - name: Build
        working-directory: pyomo-pounce
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: pyomo-pounce-dist
          path: pyomo-pounce/dist/*
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/pyomo-pounce-v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyomo-pounce/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pyomo-pounce/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
