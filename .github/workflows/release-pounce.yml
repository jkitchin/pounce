# Build and publish the `pounce-solver` Python extension to PyPI.
#
# Triggers:
#   - push of a tag matching `python-v*`  -> build wheels + sdist, publish to PyPI
#   - workflow_dispatch with `target: testpypi`  -> publish to TestPyPI for dry runs
#   - workflow_dispatch with `target: none`      -> just build artifacts, no upload
#
# Publishing uses PyPI Trusted Publishing (OIDC). The PyPI project
# `pounce-solver` must be configured with this workflow as a Trusted
# Publisher (repository: jkitchin/pounce, workflow filename:
# release-pounce.yml, environment: pypi). Same for TestPyPI under the
# `testpypi` environment.
name: release-pounce

on:
  push:
    tags: ["python-v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to upload (pypi, testpypi, none)"
        required: true
        default: "none"
        type: choice
        options: [pypi, testpypi, none]

permissions:
  contents: read

jobs:
  build-wheels:
    name: wheel ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: manylinux2014
            rust_target: x86_64-unknown-linux-gnu
            binary_name: pounce
          # GitHub's native arm64 Linux runner — public preview, free for
          # public repos. Switched away from QEMU cross-compile because
          # the standalone `cargo build --bin pounce` step we now do for
          # the bundled CLI does not play well with maturin-action's
          # QEMU container.
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: manylinux2014
            rust_target: aarch64-unknown-linux-gnu
            binary_name: pounce
          - os: macos-14       # macOS arm64 runner (Apple Silicon)
            target: aarch64
            manylinux: ""
            rust_target: aarch64-apple-darwin
            binary_name: pounce
          # x86_64 macOS wheel — cross-compiled from the Apple Silicon
          # runner. The macos-13 (Intel) runner pool is unreliable
          # (jobs queue for hours); cross-compiling from macos-14 has
          # the same coverage for Intel Mac users at a fraction of
          # the wait time.
          - os: macos-14
            target: x86_64
            manylinux: ""
            rust_target: x86_64-apple-darwin
            binary_name: pounce
          - os: windows-latest
            target: x64
            manylinux: ""
            rust_target: x86_64-pc-windows-msvc
            binary_name: pounce.exe
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pounce-cli-${{ matrix.rust_target }}

      # Build the standalone pounce CLI binary and stage it inside the
      # Python package source tree. `[tool.maturin] include` in
      # pyproject.toml then pulls it into the wheel under pounce/bin/.
      - name: Build pounce CLI binary
        run: cargo build --release --bin pounce --target ${{ matrix.rust_target }}

      - name: Stage CLI binary into the wheel
        shell: bash
        run: |
          mkdir -p python/pounce/bin
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" \
             "python/pounce/bin/${{ matrix.binary_name }}"
          ls -l python/pounce/bin/

      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          # abi3-py39 means one wheel per platform covers py39+.
          args: --release --out dist
          sccache: "true"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/python-v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pounce-solver/
    permissions:
      id-token: write   # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: publish to TestPyPI
    needs: [build-wheels, build-sdist]
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pounce-solver/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
