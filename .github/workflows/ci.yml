name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        # Gate on lints that signal real bugs / perf issues; let
        # `restriction`-group warns (unwrap_used, expect_used, etc.) and
        # style nits surface as informational. Cargo.toml's workspace
        # lints already declare those as `warn`, not `deny`.
        run: cargo clippy --workspace --exclude pounce-cutest --exclude pounce-hsl --all-targets -- -D clippy::correctness -D clippy::suspicious -D clippy::perf

      - name: Build
        run: cargo build --workspace --exclude pounce-cutest --exclude pounce-hsl --verbose

      - name: Test
        run: cargo test --workspace --exclude pounce-cutest --exclude pounce-hsl --verbose
