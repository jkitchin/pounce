name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        # Gate on lints that signal real bugs (`correctness`,
        # `suspicious`). `perf` is excluded because its current hits are
        # benign micro-opts in test code (`useless_vec!` on fixed-size
        # buffers); revisit if a real perf-relevant lint surfaces. Other
        # groups (style, restriction, pedantic) stay as informational
        # warns, matching Cargo.toml's workspace lint policy.
        run: cargo clippy --workspace --exclude pounce-cutest --exclude pounce-hsl --all-targets -- -D clippy::correctness -D clippy::suspicious

      - name: Build
        run: cargo build --workspace --exclude pounce-cutest --exclude pounce-hsl --verbose

      - name: Test
        run: cargo test --workspace --exclude pounce-cutest --exclude pounce-hsl --verbose
