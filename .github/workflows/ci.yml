name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      # Release guard: the three registry versions (Rust workspace,
      # pounce-solver wheel, pyomo-pounce) must agree, and the crates.io
      # publish list in scripts/publish-crates.sh must match the workspace's
      # publishable crates in topological order. Catches release drift (e.g.
      # the publish list naming crates that no longer exist) on every PR
      # rather than at tag time. Needs cargo metadata (feral resolves from
      # crates.io) and python3 (preinstalled on ubuntu-latest).
      - name: Release consistency check
        run: scripts/check-release-consistency.sh

      # Docs guard (#108): every page under docs/src must be reachable from
      # SUMMARY.md and every TOC link must resolve, so a newly written page
      # can't ship in the repo while staying invisible in the book.
      - name: Docs consistency check
        run: scripts/check-docs-consistency.sh

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        # Gate on lints that signal real bugs (`correctness`,
        # `suspicious`). `perf` is excluded because its current hits are
        # benign micro-opts in test code (`useless_vec!` on fixed-size
        # buffers); revisit if a real perf-relevant lint surfaces. Other
        # groups (style, restriction, pedantic) stay as informational
        # warns, matching Cargo.toml's workspace lint policy.
        run: cargo clippy --workspace --exclude pounce-hsl --all-targets -- -D clippy::correctness -D clippy::suspicious

      - name: Build
        run: cargo build --workspace --exclude pounce-hsl --verbose

      - name: Test
        run: cargo test --workspace --exclude pounce-hsl --verbose

      # pounce-hsl is excluded from the build/test/clippy steps above because
      # it FFI-links libcoinhsl (HSL is licensed and absent from CI), so those
      # steps can't link it. But it IS on the crates.io publish list
      # (scripts/publish-crates.sh, 5th of 19), and without this step nothing
      # in CI ever compiles it: a type/syntax error would first surface during
      # the `cargo publish` verify build mid-release — after the four crates
      # ahead of it have already been irreversibly published (M39).
      # `cargo check` type-checks the crate (lib + tests via --all-targets)
      # without linking; build.rs degrades to a plain rlib with no link
      # directives when COINHSL_DIR is unset, so this needs no HSL install.
      - name: Compile-check pounce-hsl (publishable, link-excluded above)
        run: cargo check -p pounce-hsl --all-targets --verbose

  # Exercise the Python surface (the `pounce.jax` differentiable /
  # sensitivity / path-following APIs) on every PR. The Rust `test` job
  # above covers the solver core, and `wheel-smoke` only imports the
  # package — neither runs pytest, so without this job the entire
  # Python feature surface lands untested in CI. Builds the wheel the
  # same way wheel-smoke does, then installs the jax + diffrax extras
  # and runs the test suite.
  python-test:
    name: Python tests (jax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: x86_64
          manylinux: manylinux2014
          args: --release --out dist
          sccache: "true"
      - name: Install wheel + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install python/dist/*.whl pytest scipy "jax[cpu]" diffrax
      - name: Run Python tests
        run: python -m pytest python/tests -q

  # Exercise the PyTorch frontend (`pounce.torch`, pounce#109) on every
  # PR. Mirrors `python-test` but installs the CPU torch wheel alongside
  # jax so both the torch suite and the JAX↔Torch parity fixtures run.
  python-test-torch:
    name: Python tests (torch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: x86_64
          manylinux: manylinux2014
          args: --release --out dist
          sccache: "true"
      - name: Install wheel + test deps
        run: |
          python -m pip install --upgrade pip
          # CPU torch wheel — pounce solves on the host, no CUDA needed.
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install python/dist/*.whl pytest scipy "jax[cpu]"
      - name: Run Python torch + parity tests
        run: |
          python -m pytest python/tests/test_torch.py \
            python/tests/test_qp_torch.py \
            python/tests/test_socp_torch.py \
            python/tests/test_parity_jax_torch.py -q

  # Smoke-build the `pounce-solver` wheel on every PR so packaging
  # regressions surface here, not at tag time. Runs only on Linux
  # x86_64; the full multi-platform matrix lives in release-pounce.yml
  # and fires on tag push. Mirrors that workflow's bundle-the-CLI flow.
  wheel-smoke:
    name: wheel smoke (pounce-solver)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build pounce CLI binary
        run: cargo build --release --bin pounce
      - name: Stage CLI binary into wheel
        run: |
          mkdir -p python/pounce/bin
          cp target/release/pounce python/pounce/bin/pounce
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: x86_64
          manylinux: manylinux2014
          args: --release --out dist
          sccache: "true"
      - name: Install + smoke (Python API + CLI)
        run: |
          ls -l python/dist/
          python -m pip install --upgrade pip
          python -m pip install python/dist/*.whl
          python -c "import pounce; print('import ok:', pounce.__file__)"
          # The console-script entry should now exist on PATH and shim
          # to the bundled binary. `--help` exercises the full execve
          # round-trip without needing an actual .nl input file.
          which pounce
          pounce --help | head -5

  # Smoke-build the pyomo-pounce wheel and run its test suite. Pure-Python
  # now: the `pounce` binary comes from the `pounce-solver` dep, not bundled
  # here. We build the wheel, install it alongside a locally-built `pounce`
  # on PATH (since `pounce-solver` may not yet be on PyPI at PR time), confirm
  # the plugin resolves the executable, then run `pytest pyomo-pounce/tests`
  # end-to-end against that binary. The pytest step exercises actual solves
  # (option forwarding, routing) that a plain import smoke test cannot —
  # without it, routing regressions like pounce#186 ship silently.
  pyomo-pounce-smoke:
    name: wheel smoke (pyomo-pounce)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: python -m pip install --upgrade pip build
      - name: Build wheel + sdist
        working-directory: pyomo-pounce
        run: |
          python -m build
          ls -l dist/
      - name: Build pounce CLI (stand-in for pounce-solver dep)
        run: cargo build --release --bin pounce
      - name: Install + smoke
        run: |
          python -m pip install pyomo
          # Install without deps because `pounce-solver` may not yet be
          # published; the locally-built CLI on PATH satisfies the
          # runtime requirement.
          python -m pip install --no-deps pyomo-pounce/dist/*.whl
          export PATH="$PWD/target/release:$PATH"
          which pounce
          python -c "import pyomo_pounce; from pyomo.opt import SolverFactory; s = SolverFactory('pounce'); print('exe:', s.executable())"
      - name: Run pyomo-pounce tests
        run: |
          python -m pip install pytest
          # The plugin resolves `pounce` from PATH, so re-export it here
          # (each `run:` is a fresh shell). These tests drive real solves
          # through the AMPL/`.nl` layer — option forwarding, solver routing —
          # which is what catches regressions the import smoke test misses.
          export PATH="$PWD/target/release:$PATH"
          python -m pytest pyomo-pounce/tests -q
