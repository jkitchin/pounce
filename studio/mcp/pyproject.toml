[build-system]
requires = ["maturin>=1.4,<2.0"]
build-backend = "maturin"

[project]
name = "pounce-studio-mcp"
version = "0.1.0"
description = "MCP server exposing pounce solve reports as Claude-callable tools. Analysis backed by pounce-studio-core via PyO3."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "EPL-2.0" }
authors = [{ name = "pounce-studio contributors" }]
dependencies = ["mcp>=1.0"]

[project.optional-dependencies]
dev = ["pytest>=7"]

[project.scripts]
pounce-studio-mcp = "pounce_studio_mcp.server:main"

[tool.maturin]
manifest-path = "../../crates/pounce-studio-pyo3/Cargo.toml"
python-source = "."
module-name = "pounce_studio_mcp._native"
features = ["pyo3/extension-module"]
strip = true
